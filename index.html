<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music</title>
    <style>
        :root { --spotify-green: #1DB954; --bg: #000; --card: #181818; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* Sidebar/Nav */
        nav { padding: 20px; font-size: 24px; font-weight: bold; color: white; }

        main { flex: 1; padding: 0 20px; overflow-y: auto; padding-bottom: 150px; }
        
        .search-container { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; background: #282828; color: white; font-size: 16px; outline: none; }

        /* Album Art / Player Area */
        .player-box { 
            width: 100%; max-width: 320px; margin: 20px auto; 
            aspect-ratio: 1; background: #222; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Song List Styling */
        .section-title { margin: 20px 0 10px; font-size: 18px; }
        .song-item { 
            display: flex; align-items: center; padding: 12px; 
            background: var(--card); margin-bottom: 8px; border-radius: 8px;
            transition: background 0.2s;
        }
        .song-item:active { background: #333; }
        .icon-box { width: 40px; height: 40px; background: #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .info { margin-left: 15px; flex: 1; }
        .info .title { font-weight: bold; font-size: 14px; margin-bottom: 2px; }
        .info .artist { color: #b3b3b3; font-size: 12px; }

        footer { 
            position: fixed; bottom: 0; width: 100%; height: 110px; 
            background: rgba(18, 18, 18, 0.95); border-top: 1px solid #282828; 
            backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #current-song { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: var(--spotify-green); }
    </style>
</head>
<body>

<nav>Music</nav>

<main>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for songs..." oninput="getSuggestions(this.value)">
    </div>

    <div class="player-box">
        <div id="player"></div>
    </div>

    <div class="section-title" id="list-header">Recent Music</div>
    <div id="results-grid">
        <div class="song-item" onclick="loadSong('Birds of a Feather Billie Eilish')">
            <div class="icon-box">🎵</div>
            <div class="info"><div class="title">Birds of a Feather</div><div class="artist">Billie Eilish</div></div>
        </div>
        <div class="song-item" onclick="loadSong('Espresso Sabrina Carpenter')">
            <div class="icon-box">🎵</div>
            <div class="info"><div class="title">Espresso</div><div class="artist">Sabrina Carpenter</div></div>
        </div>
        <div class="song-item" onclick="loadSong('Not Like Us Kendrick Lamar')">
            <div class="icon-box">🎵</div>
            <div class="info"><div class="title">Not Like Us</div><div class="artist">Kendrick Lamar</div></div>
        </div>
    </div>
</main>

<footer>
    <div id="current-song">Ready to Play</div>
    <div style="font-size: 11px; color: #888;">Tap the video box to play on iOS</div>
</footer>

<script>
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: 'IZ4otZzKfC0', // Your example link
            playerVars: { 'playsinline': 1, 'controls': 1, 'modestbranding': 1 },
            events: {
                'onReady': () => console.log("Player Ready"),
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('current-song').innerText = "Now Playing";
        }
    }

    // Google Suggest API (No API Key Needed)
    function getSuggestions(query) {
        if (query.length < 2) return;
        const script = document.createElement('script');
        script.src = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(query)}&callback=renderResults`;
        document.body.appendChild(script);
    }

    function renderResults(data) {
        document.getElementById('list-header').innerText = "Search Results";
        const container = document.getElementById('results-grid');
        container.innerHTML = '';
        data[1].forEach(term => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.onclick = () => loadSong(term);
            div.innerHTML = `
                <div class="icon-box">🎵</div>
                <div class="info"><div class="title">${term}</div><div class="artist">YouTube Music</div></div>
            `;
            container.appendChild(div);
        });
    }

    function loadSong(term) {
        document.getElementById('current-song').innerText = "Loading: " + term;
        
        // This force-reloads the player with a search-based playlist
        // index: 0 ensures it plays the first (most relevant) result
        player.loadPlaylist({
            list: term,
            listType: 'search',
            index: 0
        });

        // Scroll up to the player so user can interact with the YouTube window
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
