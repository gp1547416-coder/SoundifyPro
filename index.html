<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-grey: #181818;
            --spotify-green: #1DB954;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Layout */
        .container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar (Hidden on small iOS screens for better UX) */
        nav {
            width: 240px;
            background: black;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (max-width: 768px) { nav { display: none; } }

        /* Main Content */
        main {
            flex: 1;
            background: linear-gradient(to bottom, #222, #121212);
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 110px;
        }

        /* Search Bar */
        .search-box {
            position: sticky;
            top: 0;
            padding: 10px 0;
            background: rgba(18,18,18,0.9);
            z-index: 10;
        }

        #search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            background: white;
            font-size: 14px;
            outline: none;
        }

        /* Grid UI */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--card-grey);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .card:hover { background: #282828; }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            margin-bottom: 10px;
            background: #333;
        }

        .card-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-artist { color: var(--text-muted); font-size: 12px; }

        /* Bottom Player Bar */
        footer {
            height: 90px;
            background: #181818;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .video-container {
            width: 0; height: 0; overflow: hidden; position: absolute;
        }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <div style="font-size: 22px; font-weight: bold;">Music</div>
        <div class="text-muted">Home</div>
        <div style="color: white; font-weight: bold;">Search</div>
    </nav>

    <main>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search for songs or artists..." oninput="fetchResults(this.value)">
        </div>

        <h2 id="title-header">Recent Music</h2>
        <div class="grid" id="results-grid">
            </div>
    </main>
</div>

<div class="video-container" id="player-wrapper">
    <div id="player"></div>
</div>

<footer>
    <div id="current-info" style="flex: 1;">
        <div id="playing-title" style="font-size: 14px; font-weight: bold;">No song selected</div>
        <div id="playing-artist" style="font-size: 12px; color: #b3b3b3;">Search to play music</div>
    </div>
    <div style="flex: 1; text-align: center; font-size: 24px; cursor: pointer;" onclick="togglePlay()">
        <span id="play-icon">▶️</span>
    </div>
    <div style="flex: 1;"></div>
</footer>

<script>
    // YouTube IFrame API Loader
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0', width: '0',
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    // Real-time Fetch using Google's Suggestion API (CORS Friendly)
    async function fetchResults(query) {
        if (query.length < 2) return;
        
        document.getElementById('title-header').innerText = "Search Results";
        
        // We use a JSONP hack to get suggestions without CORS issues
        const script = document.createElement('script');
        script.src = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(query)}&callback=handleSuggestions`;
        document.body.appendChild(script);
    }

    function handleSuggestions(data) {
        const suggestions = data[1];
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '';

        suggestions.forEach((term, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => playSong(term);
            card.innerHTML = `
                <img src="https://picsum.photos/seed/${index+term}/200" alt="Cover">
                <div class="card-title">${term}</div>
                <div class="card-artist">YouTube Music</div>
            `;
            grid.appendChild(card);
        });
    }

    function playSong(term) {
        document.getElementById('playing-title').innerText = term;
        document.getElementById('playing-artist').innerText = "Playing from YouTube";
        
        // In a real app, you'd fetch the VideoID. 
        // For this demo, we search and play the first result.
        // Note: For a true 1:1 play, a small backend or RapidAPI is usually needed.
        // This will attempt to load a video based on the term.
        player.loadVideoByUrl(`https://www.youtube.com/v/search?keyword=${encodeURIComponent(term)}`);
        document.getElementById('play-icon').innerText = '⏸';
    }

    function togglePlay() {
        const state = player.getPlayerState();
        if (state === 1) {
            player.pauseVideo();
            document.getElementById('play-icon').innerText = '▶️';
        } else {
            player.playVideo();
            document.getElementById('play-icon').innerText = '⏸';
        }
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            document.getElementById('play-icon').innerText = '▶️';
        }
    }
</script>

</body>
</html>
