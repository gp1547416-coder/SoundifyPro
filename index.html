<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; -webkit-tap-highlight-color: transparent; }
        .spotify-green { color: #1DB954; }
        .glass-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .search-input { background: #121212; border: 1px solid #333; }
        .search-input:focus { border-color: #1DB954; outline: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-24">

    <header class="p-6">
        <h1 class="text-3xl font-black tracking-tighter underline decoration-green-500">Music</h1>
    </header>

    <div class="px-6 mb-4">
        <div class="relative">
            <input id="query" type="text" placeholder="Search song, artist, or album..." 
                class="search-input w-full p-4 rounded-xl text-lg">
            <button onclick="findMusic()" class="absolute right-3 top-3 bg-green-500 text-black px-4 py-1 rounded-lg font-bold">Find</button>
        </div>
    </div>

    <div id="resultsList" class="px-6 space-y-4">
        <p class="text-zinc-500 text-sm">Enter a prompt to fetch "embedded" music results.</p>
    </div>

    <div id="playerDock" class="fixed bottom-0 left-0 w-full p-4 glass-card rounded-t-3xl hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-1.5 bg-zinc-600 rounded-full mb-4"></div>
            <div id="videoContainer" class="w-full aspect-video rounded-xl overflow-hidden bg-black">
                </div>
            <button onclick="closePlayer()" class="mt-4 text-zinc-400 text-sm font-medium">Close Player</button>
        </div>
    </div>

    <script>
        function findMusic() {
            const query = document.getElementById('query').value;
            const list = document.getElementById('resultsList');
            
            if(!query) return;

            // Clear previous and show "fetching" state
            list.innerHTML = `<div class="animate-pulse flex space-x-4">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-zinc-800 rounded w-3/4"></div>
                    <div class="h-4 bg-zinc-800 rounded"></div>
                </div>
            </div>`;

            // Since we can't scrape Spotify directly in the browser, 
            // we redirect the "Action" to an embed trigger.
            // This UI simulates the search result.
            setTimeout(() => {
                list.innerHTML = `
                <div onclick="playEmbed('${encodeURIComponent(query)}')" class="glass-card p-4 rounded-2xl flex items-center justify-between active:scale-95 transition">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-gradient-to-br from-green-600 to-black rounded-lg flex items-center justify-center text-2xl">🎵</div>
                        <div>
                            <h3 class="font-bold text-lg">${query}</h3>
                            <p class="text-zinc-400 text-sm">Tap to stream</p>
                        </div>
                    </div>
                    <span class="text-green-500">▶</span>
                </div>
                <p class="text-xs text-zinc-600 text-center mt-4">Results fetched via YouTube Embed API</p>
                `;
            }, 800);
        }

        function playEmbed(term) {
            const dock = document.getElementById('playerDock');
            const container = document.getElementById('videoContainer');
            
            // Use YouTube's "Search" list feature to find the best match automatically
            // This plays the first result for the search term provided
            const embedUrl = `https://www.youtube.com/embed?listType=search&list=${term}&autoplay=1`;
            
            container.innerHTML = `<iframe width="100%" height="100%" src="${embedUrl}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            
            dock.classList.remove('hidden');
        }

        function closePlayer() {
            document.getElementById('playerDock').classList.add('hidden');
            document.getElementById('videoContainer').innerHTML = '';
        }
    </script>
</body>
</html>
