<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg: #000000;
            --surface: #121212;
            --card: #181818;
        }
        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: linear-gradient(0deg, var(--bg) 70%, #222 100%);
        }
        .search-bar {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            padding: 10px 0;
            z-index: 100;
        }
        input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #222;
            color: white;
            box-sizing: border-box;
            font-size: 16px; /* Prevents iOS zoom */
        }
        /* The Player "Album Art" Area */
        .now-playing-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        #player-wrapper {
            width: 280px;
            height: 280px;
            background: #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        /* Song List Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .song-row {
            display: flex;
            align-items: center;
            padding: 10px;
            background: var(--card);
            border-radius: 6px;
            cursor: pointer;
        }
        .song-info { margin-left: 15px; }
        .song-info div:last-child { color: #b3b3b3; font-size: 13px; }

        footer {
            height: 100px;
            background: #121212;
            border-top: 1px solid #282828;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-big {
            background: var(--spotify-green);
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

<main>
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search for a song..." oninput="search(this.value)">
    </div>

    <div class="now-playing-container">
        <div id="player-wrapper">
            <div id="player"></div>
        </div>
    </div>

    <div id="status" style="text-align: center; color: var(--spotify-green); font-size: 12px; margin-bottom: 10px;">
        Tap the video box to start audio on iOS
    </div>

    <div class="grid" id="results">
        </div>
</main>

<footer>
    <button class="play-big" onclick="togglePlay()">PLAY / PAUSE</button>
</footer>

<script>
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '280',
            width: '280',
            videoId: 'dQw4w9WgXcQ', // Default starter song
            playerVars: {
                'playsinline': 1,
                'autoplay': 0,
                'controls': 1
            },
            events: {
                'onReady': () => console.log("Ready")
            }
        });
    }

    function search(q) {
        if (q.length < 3) return;
        const s = document.createElement('script');
        s.src = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(q)}&callback=showResults`;
        document.body.appendChild(s);
    }

    function showResults(data) {
        const results = data[1];
        const container = document.getElementById('results');
        container.innerHTML = '';
        results.forEach(term => {
            const div = document.createElement('div');
            div.className = 'song-row';
            div.onclick = () => playThis(term);
            div.innerHTML = `<div class="song-info"><div>${term}</div><div>YouTube Music</div></div>`;
            container.appendChild(div);
        });
    }

    function playThis(term) {
        document.getElementById('status').innerText = "Loading: " + term;
        // Search and play the first result
        player.loadPlaylist({
            list: term,
            listType: 'search',
            index: 0
        });
    }

    function togglePlay() {
        const state = player.getPlayerState();
        if (state == 1) player.pauseVideo();
        else player.playVideo();
    }
</script>
</body>
</html>
