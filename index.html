<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-grey: #181818;
            --spotify-green: #1DB954;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        main {
            flex: 1;
            background: linear-gradient(to bottom, #222, #121212);
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 110px;
        }
        .search-box {
            position: sticky;
            top: 0;
            background: rgba(18,18,18,0.9);
            padding: 10px 0;
            z-index: 10;
        }
        #search-input {
            width: 90%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            outline: none;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .card {
            background: var(--card-grey);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .card img {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        footer {
            height: 90px;
            background: #181818;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }
        #player-container {
            position: absolute;
            top: -9999px; /* Hide the video off-screen */
        }
        .play-btn {
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<main>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search songs..." oninput="fetchResults(this.value)">
    </div>
    <h2 id="view-title">Recent Music</h2>
    <div class="grid" id="results-grid"></div>
</main>

<div id="player-container">
    <div id="player"></div>
</div>

<footer>
    <div style="flex: 1;">
        <div id="playing-title" style="font-size: 14px; font-weight: bold;">Select a song</div>
        <div id="playing-artist" style="font-size: 12px; color: var(--text-muted);">Ready to play</div>
    </div>
    <button class="play-btn" onclick="togglePlay()" id="master-play">▶</button>
    <div style="flex: 1;"></div>
</footer>

<script>
    let player;
    let currentSearch = "";

    // Load YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0',
            width: '0',
            playerVars: { 'autoplay': 1, 'playsinline': 1 },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        console.log("Player Ready");
    }

    async function fetchResults(query) {
        if (query.length < 2) return;
        const script = document.createElement('script');
        script.src = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(query)}&callback=handleSuggestions`;
        document.body.appendChild(script);
    }

    function handleSuggestions(data) {
        const suggestions = data[1];
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '';
        suggestions.forEach((term, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => selectSong(term);
            card.innerHTML = `
                <img src="https://picsum.photos/seed/${term}/200">
                <div style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${term}</div>
            `;
            grid.appendChild(card);
        });
    }

    function selectSong(term) {
        document.getElementById('playing-title').innerText = term;
        document.getElementById('playing-artist').innerText = "YouTube Source";
        
        // On iOS, we must "cue" and then let the user press Play, 
        // OR attempt to load it directly if the user has already interacted.
        const searchQuery = encodeURIComponent(term + " song");
        
        // We use a trick: load a search results "playlist" and play the first video
        player.loadPlaylist({
            list: term,
            listType: 'search',
            index: 0
        });
        
        document.getElementById('master-play').innerText = '⏸';
    }

    function togglePlay() {
        const state = player.getPlayerState();
        if (state === 1) {
            player.pauseVideo();
            document.getElementById('master-play').innerText = '▶';
        } else {
            player.playVideo();
            document.getElementById('master-play').innerText = '⏸';
        }
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('master-play').innerText = '⏸';
        } else {
            document.getElementById('master-play').innerText = '▶';
        }
    }
</script>
</body>
</html>
