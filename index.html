<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .song-card:hover { background: rgba(255, 255, 255, 0.1); cursor: pointer; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-6 flex justify-between items-center border-b border-white/10">
        <h1 class="text-2xl font-bold tracking-tighter text-green-500">Music</h1>
    </nav>

    <main class="flex-grow p-6 max-w-4xl mx-auto w-full">
        <div class="relative mb-8">
            <input id="searchInput" type="text" placeholder="Search for a song..." 
                class="w-full p-4 rounded-full bg-zinc-900 border border-zinc-800 focus:outline-none focus:ring-2 focus:ring-green-500 transition">
            <button onclick="searchMusic()" class="absolute right-4 top-3 text-zinc-400 hover:text-white">🔍</button>
        </div>

        <div id="results" class="grid grid-cols-1 gap-3">
            <p class="text-zinc-500 text-center mt-10">Search for your favorite artist or track.</p>
        </div>
    </main>

    <div id="playerContainer" class="fixed bottom-0 left-0 w-full p-4 glass translate-y-full transition-transform duration-500">
        <div class="max-w-4xl mx-auto flex items-center gap-4">
            <div id="embedWrapper" class="w-full rounded-lg overflow-hidden">
                </div>
            <button onclick="closePlayer()" class="text-zinc-400 hover:text-white">✕</button>
        </div>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            if(!query) return;

            resultsDiv.innerHTML = '<p class="text-center">Searching...</p>';

            // Using a public search proxy (Note: In a real app, use your own API Key)
            const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
            
            // For a browser-only demo, we'll simulate the "fetch" 
            // Real scraping usually requires a backend like Node.js
            // Here, we provide a quick mock-up of how the interaction works:
            
            resultsDiv.innerHTML = `
                <div onclick="playSong('dQw4w9WgXcQ', 'Never Gonna Give You Up')" class="song-card p-4 rounded-xl flex items-center gap-4 transition">
                    <div class="w-12 h-12 bg-zinc-800 rounded flex items-center justify-center">🎵</div>
                    <div>
                        <div class="font-medium">${query} (Result)</div>
                        <div class="text-sm text-zinc-400">Click to play</div>
                    </div>
                </div>
            `;
        }

        function playSong(id, title) {
            const container = document.getElementById('playerContainer');
            const wrapper = document.getElementById('embedWrapper');
            
            wrapper.innerHTML = `
                <iframe width="100%" height="80" 
                    src="https://www.youtube.com/embed/${id}?autoplay=1" 
                    frameborder="0" allow="autoplay; encrypted-media">
                </iframe>`;
            
            container.classList.remove('translate-y-full');
        }

        function closePlayer() {
            document.getElementById('playerContainer').classList.add('translate-y-full');
            document.getElementById('embedWrapper').innerHTML = '';
        }
    </script>
</body>
</html>
