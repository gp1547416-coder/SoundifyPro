<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <style>
        :root {
            --primary: #1DB954; /* Spotify Green */
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .player-card {
            background: var(--surface);
            width: 90%;
            max-width: 350px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .album-art {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #333, #444);
            margin: 0 auto 1.5rem;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        h1 { font-size: 1.5rem; margin: 0.5rem 0; }
        p { color: #b3b3b3; margin-bottom: 2rem; }
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        button {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.9); }
        .play-btn {
            background: var(--primary);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-size: 1.2rem;
        }
        #progress-container {
            width: 100%;
            height: 5px;
            background: #444;
            margin-bottom: 1.5rem;
            border-radius: 5px;
            cursor: pointer;
        }
        #progress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="album-art">🎵</div>
    <h1 id="title">Music Player</h1>
    <p id="artist">Sample Artist</p>

    <div id="progress-container">
        <div id="progress"></div>
    </div>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button class="play-btn" id="play" onclick="togglePlay()">▶</button>
        <button onclick="next()">⏭</button>
    </div>
</div>

<audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');
    const progress = document.getElementById('progress');
    const progressContainer = document.getElementById('progress-container');

    let isPlaying = false;

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerText = '▶';
        } else {
            audio.play();
            playBtn.innerText = '⏸';
        }
        isPlaying = !isPlaying;
    }

    audio.ontimeupdate = (e) => {
        const { duration, currentTime } = e.srcElement;
        const progressPercent = (currentTime / duration) * 100;
        progress.style.width = `${progressPercent}%`;
    };

    progressContainer.onclick = (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
    };

    function next() { alert("Next Track (add more URLs to the script!)"); }
    function prev() { alert("Previous Track"); }
</script>

</body>
</html>
