<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music</title>
    <style>
        :root { --spotify-green: #1DB954; --bg: #000; --card: #181818; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        nav { padding: 20px; font-size: 24px; font-weight: bold; }
        main { flex: 1; padding: 0 20px; overflow-y: auto; padding-bottom: 150px; }
        
        .search-container { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; background: #282828; color: white; font-size: 16px; outline: none; }

        /* The Player Frame - Visible so iOS doesn't kill it */
        .player-box { 
            width: 100%; max-width: 320px; margin: 20px auto; 
            aspect-ratio: 16/9; background: #222; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .song-item { 
            display: flex; align-items: center; padding: 12px; 
            background: var(--card); margin-bottom: 8px; border-radius: 8px;
        }
        .info { flex: 1; margin-left: 15px; }
        .play-icon-btn { color: var(--spotify-green); font-size: 20px; padding: 0 10px; }

        footer { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: #121212; border-top: 1px solid #282828; 
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<nav>Music</nav>

<main>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Type a song name..." oninput="getSuggestions(this.value)">
    </div>

    <div class="player-box">
        <iframe id="yt-player" width="100%" height="100%" 
                src="https://www.youtube.com/embed/IZ4otZzKfC0?enablejsapi=1&playsinline=1" 
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div id="results-grid">
        <p style="color: #888; text-align: center;">Search for a song to change the player</p>
    </div>
</main>

<footer>
    <div style="font-size: 12px; color: var(--spotify-green);">Tap the song, then tap Play on the video</div>
</footer>

<script>
    // This function changes the URL of the iframe directly
    // This is the most reliable way to change content on iOS Edge
    function loadSong(term) {
        const player = document.getElementById('yt-player');
        
        // We use the YouTube 'search' embed endpoint
        // This forces the iframe to navigate to the new search result
        const newSrc = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(term)}&playsinline=1&autoplay=1`;
        
        player.src = newSrc;
        
        // Scroll to top so you can hit play
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function getSuggestions(query) {
        if (query.length < 2) return;
        const script = document.createElement('script');
        script.src = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(query)}&callback=renderResults`;
        document.body.appendChild(script);
    }

    function renderResults(data) {
        const container = document.getElementById('results-grid');
        container.innerHTML = '';
        data[1].forEach(term => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.onclick = () => loadSong(term);
            div.innerHTML = `
                <div class="info">
                    <div style="font-weight:bold; font-size:14px;">${term}</div>
                    <div style="color:#888; font-size:12px;">YouTube Music</div>
                </div>
                <div class="play-icon-btn">▶</div>
            `;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
