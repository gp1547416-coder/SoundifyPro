<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music</title>
    <style>
        :root { --green: #1DB954; --bg: #000; --card: #181818; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .search-bar { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 10px 0; z-index: 10; }
        input { width: 100%; padding: 15px; border-radius: 30px; border: none; background: #333; color: white; font-size: 16px; outline: none; }
        
        #player-wrapper { 
            width: 100%; max-width: 300px; aspect-ratio: 1; 
            margin: 20px auto; background: #222; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .song-card { 
            display: flex; align-items: center; padding: 12px; 
            background: var(--card); margin-bottom: 8px; border-radius: 8px; 
            border: 1px solid transparent;
        }
        .song-card:active { border-color: var(--green); background: #222; }
        
        footer { 
            position: fixed; bottom: 0; width: 100%; height: 100px; 
            background: #121212; border-top: 1px solid #282828; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .controls { font-weight: bold; color: var(--green); margin-bottom: 5px; }
    </style>
</head>
<body>

<main>
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search for any song..." oninput="searchSongs(this.value)">
    </div>

    <div id="player-wrapper">
        <div id="player"></div>
    </div>

    <div id="results-list">
        </div>
</main>

<footer>
    <div class="controls" id="current-status">Tap a song to load</div>
    <div style="font-size: 12px; color: #888;">Use YouTube controls inside the box to Play</div>
</footer>

<script>
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: 'dQw4w9WgXcQ', // The Rickroll
            playerVars: { 'playsinline': 1, 'controls': 1, 'modestbranding': 1 },
            events: { 'onStateChange': (e) => { if(e.data === 1) document.getElementById('current-status').innerText = "Playing Now"; } }
        });
    }

    function searchSongs(q) {
        if (q.length < 3) return;
        const s = document.createElement('script');
        // Using the suggest API to get real song names
        s.src = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(q)}&callback=renderResults`;
        document.body.appendChild(s);
    }

    function renderResults(data) {
        const list = document.getElementById('results-list');
        list.innerHTML = '';
        data[1].forEach(term => {
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `<span>🎵</span><div style="margin-left:15px">${term}</div>`;
            div.onclick = () => changeSong(term);
            list.appendChild(div);
        });
    }

    function changeSong(term) {
        document.getElementById('current-status').innerText = "Loading: " + term;
        
        // This is the most reliable "Search to Play" hack for mobile browsers
        // It tells the player: "Search for this and play the top result immediately"
        player.loadPlaylist({
            list: term,
            listType: 'search',
            index: 0
        });

        // Scroll back to top so user can see/hit play on the player
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>

</body>
</html>
